<!DOCTYPE html>
<html>
<head>
  <title>MLB Guess 5</title>

  <link rel="stylesheet" href="css/style.css">
  <script src="js/game.js" defer></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<div class="top-bar">

  <button class="icon-btn" id="backBtn">❮</button>

  <div class="title">MLB Guess 5</div>

  <div class="menu-wrapper">
    <button class="icon-btn" id="menuBtn">☰</button>

    <div id="menu" class="menu hidden">
      <button class="menu-btn" id="hintBtn">Hint</button>
      <button class="menu-btn" id="testGameBtn">CONFIG - Test Game</button>
      <button class="menu-btn" id="resetGameBtn">CONFIG - Reset Data</button>
    </div>
  </div>

</div>

<div class="container">
  
  <h3 id="gameTitle">Loading...</h3>

  <div class="input-wrapper">
    <div class="top-input">
      <div id="guessCounter">Guesses: 0</div>
      <div id="hint"></div>
    </div>
    <input id="search" placeholder="Guess a player..." autocomplete="off">
    <div id="dropdown" class="dropdown"></div>

    <div id="message" class="message"></div>
  </div>

  <div id="lastGuess" class="board"></div>
  <div id="board" class="board"></div>
</div>

<div id="winPopup" class="popup">
  <div class="popup-content">

    <h2>You Win!</h2>

    <div id="scoreStats" class="score-stats"></div>

    <button onclick="shareResults()">Share Results</button>
    <button onclick="closePopup()">Close</button>

  </div>
</div>

</body>
</html>
