<!DOCTYPE html>
<html>
<head>
  <title>MLB Guess 5</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding-top: 60px;
    }

    .container {
      width: 500px;
      text-align: center;
      position: relative;
    }

    .input-wrapper {
      position: relative;
      width: 100%;
    }

    input {
      width: 100%;
      padding: 15px;
      font-size: 18px;
      border-radius: 10px;
      border: 2px solid #ccc;
      box-sizing: border-box;
      outline: none;
    }

    input:focus {
      border-color: #007bff;
      box-shadow: 0 0 8px rgba(0,123,255,0.3);
    }

    .guess-counter {
      font-size: 14px;
      color: #666;
      margin-bottom: 6px;
      text-align: left;
    }

    .message {
      margin-top: 6px;
      font-size: 13px;
      color: #d93025;
      text-align: left;
      min-height: 18px;
    }

    .dropdown {
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      width: 100%;
      background: white;
      border-radius: 10px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
      max-height: 240px;
      overflow-y: auto;
      display: none;
      z-index: 9999;
      text-align: left;
    }

    .item {
      padding: 12px;
      cursor: pointer;
      border-bottom: 1px solid #eee;
    }

    .item:hover {
      background: #f0f6ff;
    }

    .item.active {
      background: #dbe9ff;
    }

    .board {
      margin-top: 20px;
      text-align: left;
    }

    .row {
      margin-bottom: 8px;
      padding: 10px;
      border-radius: 8px;
      display: flex;
      justify-content: space-between;
      box-shadow: 0 2px 3px rgba(0,0,0,0.1);
      font-weight: 500;
      background: white;
      transition: 0.2s;
    }

    .rowGuess {
      margin-bottom: 8px;
      padding: 10px;
      border-radius: 8px;
      display: flex;
      justify-content: space-between;
      /*box-shadow: 0 2px 3px rgba(0,0,0,0.1);*/
      font-weight: 500;
      background: white;
      transition: 0.2s;
      border: 2px solid #3f3f3f;
    }

    #gameTitle {
      margin: 5px 0 15px;
      font-size: 16px;
      font-weight: 600;
      color: #333;
    }

    .rank { width: 40px; font-weight: bold; }
    .name { flex: 1; }
    .value { font-weight: bold; }

    .top5 { background: #d4edda; }
    .top10 { background: #fff3cd; }
    .top25 { background: #f8d7da; }
    .ranked { background: #e2e3e5; }
    .other { background: #c6c7c9; }
  </style>
</head>

<body>

<div class="container">
  <h2>MLB Guess 5</h2>

  <h3 id="gameTitle">Loading...</h3>

  <div class="input-wrapper">
    <div id="guessCounter" class="guess-counter">Guesses: 0</div>

    <input id="search" placeholder="Guess a player..." autocomplete="off">
    <div id="dropdown" class="dropdown"></div>

    <div id="message" class="message"></div>
  </div>

  <div id="lastGuess" class="board"></div>
  <div id="board" class="board"></div>
</div>

<script>
const input = document.getElementById("search");
const dropdown = document.getElementById("dropdown");
const board = document.getElementById("board");
const lastGuess = document.getElementById("lastGuess");
const guessCounter = document.getElementById("guessCounter");
const message = document.getElementById("message");
const gameTitle = document.getElementById("gameTitle");

const GAMES = [
  {
    title: "Most Career RBI All-Time",
    stats: "career",
    group: "hitting",
    sortStat: "rbi"
  },

  {
    title: "Most Career Home Runs All-Time",
    stats: "career",
    group: "hitting",
    sortStat: "homeRuns"
  },

  {
    title: "Most Stolen Bases All-Time",
    stats: "career",
    group: "hitting",
    sortStat: "stolenBases"
  },

  {
    title: "Most Doubles Since 2020",
    stats: "byDateRange",
    group: "hitting",
    sortStat: "doubles",
    startDate: "2020-01-01",
    endDate: "2026-12-31"
  },

  {
    title: "Most Strikeouts Since 2020",
    stats: "byDateRange",
    group: "pitching",
    sortStat: "strikeOuts",
    startDate: "2020-01-01",
    endDate: "2026-12-31"
  },

  {
    title: "Most Strikeouts in the 90s",
    stats: "byDateRange",
    group: "pitching",
    sortStat: "strikeOuts",
    startDate: "1990-01-01",
    endDate: "1999-12-31"
  },

  {
    title: "Most Home Runs in 2025",
    stats: "season",
    group: "hitting",
    sortStat: "homeRuns",
    season: 2025
  }
];


function getDailyGame() {
  const today = new Date();

  const dayNumber = Math.floor(
    Date.UTC(
      today.getUTCFullYear(),
      today.getUTCMonth(),
      today.getUTCDate()
    ) / 86400000
  );

  const index = dayNumber % GAMES.length;

  return GAMES[index];
}

const GAME = getDailyGame();


let leaderboard = [];
let guesses = [];

let matches = [];
let activeIndex = -1;
let searchTimeout = null;

// --------------------
// LOAD LEADERBOARD (CAREER RBI)
// --------------------
async function loadLeaderboard() {

  let url =
    `https://statsapi.mlb.com/api/v1/stats?` +
    `stats=${GAME.stats}` +
    `&group=${GAME.group}` +
    `&sportId=1` +
    `&sortStat=${GAME.sortStat}` +
    `&order=desc` +
    `&limit=1000`;

  if (GAME.startDate) {
    url += `&startDate=${GAME.startDate}`;
  }

  if (GAME.endDate) {
    url += `&endDate=${GAME.endDate}`;
  }

  if (GAME.season) {
    url += `&season=${GAME.season}`;
  }

  if (GAME.stats === "byDateRange") {
    url += `&playerPool=all`;
  }

  const res = await fetch(url);
  const data = await res.json();

  const leaders = data.stats?.[0]?.splits || [];

  leaderboard = leaders.map((p, i) => ({
    rank: i + 1,
    name: p.player.fullName,
    value: Number(p.stat[GAME.sortStat] || 0)
  }));

  gameTitle.textContent = GAME.title;
}

// --------------------
// LIVE SEARCH
// --------------------
async function searchPlayers(query) {
  const q = query.trim();

  if (q.length < 2) {
    matches = [];
    renderDropdown();
    return;
  }

  try {
    const res = await fetch(
      `https://statsapi.mlb.com/api/v1/people/search?names=${encodeURIComponent(q)}`
    );

    const data = await res.json();

    matches = (data.people || [])
      .map(p => p.fullName)
      .filter((v, i, a) => a.indexOf(v) === i)
      .slice(0, 8);

  } catch (e) {
    matches = [];
  }

  activeIndex = -1;
  renderDropdown();
}

// --------------------
// COLORS
// --------------------
function getColorClass(rank) {
  if (rank <= 5) return "top5";
  if (rank <= 10) return "top10";
  if (rank <= 25) return "top25";
  if (rank == "-") return "other";
  return "ranked";
}

// --------------------
// DROPDOWN
// --------------------
function renderDropdown() {
  dropdown.innerHTML = "";

  if (!matches.length) {
    dropdown.style.display = "none";
    return;
  }

  matches.forEach((name, index) => {
    const div = document.createElement("div");
    div.className = "item";

    if (index === activeIndex) div.classList.add("active");

    div.textContent = name;

    div.onclick = () => {
      input.value = name;
      dropdown.style.display = "none";
      guessPlayer();
    };

    dropdown.appendChild(div);
  });

  dropdown.style.display = "block";
}

// --------------------
// INPUT
// --------------------
input.addEventListener("input", () => {
  clearTimeout(searchTimeout);

  searchTimeout = setTimeout(() => {
    searchPlayers(input.value);
  }, 150);
});

// --------------------
// CLICK OUTSIDE
// --------------------
document.addEventListener("click", (e) => {
  if (!e.target.closest(".container")) {
    dropdown.style.display = "none";
  }
});

// --------------------
// GUESS
// --------------------
function guessPlayer() {
  const value = input.value.trim();
  if (!value) return;

  const normalized = value.toLowerCase();

  const already = guesses.some(g => g.name.toLowerCase() === normalized);

  if (already) {
    message.textContent = `Already guessed: ${value}`;
    input.value = "";
    dropdown.style.display = "none";
    lastGuess.innerHTML = "";
    return;
  }

  message.textContent = "";

  const player = leaderboard.find(p =>
    p.name.toLowerCase() === normalized
  );

  if (player) {
    guesses.unshift(player);
  } else {
    guesses.unshift({
      rank: null,
      name: value,
      value: "-"
    });
  }

  render();
  guessCounter.textContent = `Guesses: ${guesses.length}`;
  
  checkWin();
  renderLastGuess();
  input.value = "";
  dropdown.style.display = "none";
}

function renderLastGuess() {
  lastGuess.innerHTML = "";

  if (!guesses.length) return;

  const g = guesses[0];

  const div = document.createElement("div");

  const rankClass =
    typeof g.rank === "number"
      ? getColorClass(g.rank)
      : "other";

  div.className = `rowGuess ${rankClass}`;

  div.innerHTML = `
    <div class="rank">${g.rank ?? "-"}</div>
    <div class="name">${g.name}</div>
    <div class="value">${g.value}</div>
  `;

  lastGuess.appendChild(div);
  console.log("LAST GUESS:", guesses[0]);
}

// --------------------
// RENDER BOARD
// --------------------
function render() {
  board.innerHTML = "";

  const sorted = [...guesses].sort((a, b) => {
    if (a.rank === null) return 1;
    if (b.rank === null) return -1;
    return a.rank - b.rank;
  });

  sorted.forEach(g => {
    const div = document.createElement("div");
    div.className = `row ${g.rank ? getColorClass(g.rank) : "other"}`;

    div.innerHTML = `
      <div class="rank">${g.rank ?? "-"}</div>
      <div class="name">${g.name}</div>
      <div class="value">${g.value}</div>
    `;

    board.appendChild(div);
  });
}

// --------------------
// KEYBOARD
// --------------------
input.addEventListener("keydown", (e) => {
  if (e.key === "ArrowDown") {
    activeIndex = Math.min(activeIndex + 1, matches.length - 1);
    renderDropdown();
  }

  if (e.key === "ArrowUp") {
    activeIndex = Math.max(activeIndex - 1, 0);
    renderDropdown();
  }

  if (e.key === "Enter") {
    e.preventDefault();

    // if dropdown selection exists → use it
    if (activeIndex >= 0 && matches[activeIndex]) {
      input.value = matches[activeIndex];
      guessPlayer();
      return;
    }

    // otherwise only allow submit if it's an actual suggestion match
    const typed = input.value.trim().toLowerCase();

    const isValid = matches.some(
      m => m.toLowerCase() === typed
    );

    if (!isValid) {
      message.textContent = "Select a player from the list";
      return;
    }

    guessPlayer();
  }
});

function checkWin() {
  const topFiveNames = leaderboard
    .filter(p => p.rank <= 5)
    .map(p => p.name.toLowerCase());

  const guessedNames = guesses.map(
    g => g.name.toLowerCase()
  );

  const solved = topFiveNames.every(
    name => guessedNames.includes(name)
  );

  if (solved) {
    alert(`You found the Top 5!`);
  }
}

// --------------------
// INIT
// --------------------
loadLeaderboard();
</script>

</body>
</html>
